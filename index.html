<!DOCTYPE html>
<html lang="th">
<head>
	<title>ABSS Printer Control - Main Menu</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		
		body {
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
		}
		
		.container {
			background: rgba(255, 255, 255, 0.95);
			backdrop-filter: blur(10px);
			border-radius: 20px;
			box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
			padding: 40px;
			text-align: center;
			max-width: 600px;
			width: 90%;
		}
		
		.logo {
			font-size: 2.5rem;
			font-weight: 700;
			color: #333;
			margin-bottom: 10px;
			background: linear-gradient(45deg, #667eea, #764ba2);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
		}
		
		.subtitle {
			color: #666;
			font-size: 1.1rem;
			margin-bottom: 40px;
		}
		
		.menu-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
			gap: 20px;
			margin-bottom: 30px;
		}
		
		.menu-card {
			background: white;
			border-radius: 15px;
			padding: 30px 20px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
			transition: all 0.3s ease;
			cursor: pointer;
			border: 2px solid transparent;
		}
		
		.menu-card:hover {
			transform: translateY(-5px);
			box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
			border-color: #667eea;
		}
		
		.menu-icon {
			font-size: 3rem;
			margin-bottom: 15px;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 80px;
			width: 80px;
			border-radius: 50%;
			margin: 0 auto 20px;
			transition: all 0.3s ease;
		}
		
		.wifi-icon { 
			color: #4CAF50; 
			background: rgba(76, 175, 80, 0.1);
		}
		
		.bluetooth-icon { 
			color: #2196F3; 
			background: rgba(33, 150, 243, 0.1);
		}
		
		.menu-card:hover .wifi-icon {
			background: rgba(76, 175, 80, 0.2);
			transform: scale(1.1);
		}
		
		.menu-card:hover .bluetooth-icon {
			background: rgba(33, 150, 243, 0.2);
			transform: scale(1.1);
		}
		
		.menu-title {
			font-size: 1.3rem;
			font-weight: 600;
			color: #333;
			margin-bottom: 10px;
		}
		
		.menu-description {
			color: #666;
			font-size: 0.9rem;
			line-height: 1.5;
		}
		
		.footer {
			color: #999;
			font-size: 0.9rem;
		}
		
		@media (max-width: 768px) {
			.container {
				padding: 20px;
			}
			
			.logo {
				font-size: 2rem;
			}
			
			.menu-grid {
				grid-template-columns: 1fr;
			}
		}
	</style>
	<script type="text/javascript">
		function goToWifi() {
			window.location.href = 'WifiPrint.html';
		}
		
		function goToBluetooth() {
			window.location.href = 'BluetoothPrint.html';
		}
	</script>
</head>
<body>
	<div class="container">
		<div class="logo">ABSS
		</div>
		<div class="subtitle">Printer Control System</div>
		
		<div class="menu-grid">
			<div class="menu-card" onclick="goToWifi()">
				<div class="menu-icon wifi-icon"><i class="fas fa-wifi"></i></div>
				<div class="menu-title">WiFi Printing</div>
				<div class="menu-description">
					เชื่อมต่อเครื่องพิมพ์ผ่าน WiFi (TCP/IP)<br/>
					เหมาะสำหรับเครื่องพิมพ์ที่เชื่อมต่อเครือข่าย
				</div>
			</div>
			
			<div class="menu-card" onclick="goToBluetooth()">
				<div class="menu-icon bluetooth-icon"><i class="fab fa-bluetooth-b"></i></div>
				<div class="menu-title">Bluetooth Printing</div>
				<div class="menu-description">
					เชื่อมต่อเครื่องพิมพ์ผ่าน Bluetooth<br/>
					ใช้ Web Serial API รองรับ Windows และ Android
				</div>
			</div>
		</div>
		
		<div class="footer">
			© 2024 ABSS Printer Control System
		</div>
	</div>
</body>
</html>
