<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Label Print Preview</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { display: flex; flex-direction: column; gap: 15px; max-width: 800px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: bold; }
        input, select, textarea { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
        #previewContainer { margin-top: 20px; border: 1px dashed #aaa; padding: 10px; text-align: center; min-height: 200px; }
        #labelImage { max-width: 100%; display: none; }
        .loading { display: none; color: #555; }
    </style>
</head>
<body>
    <h1>WiFi Label Print Preview</h1>
    <div class="container">
        <div class="control-group">
            <label for="density">Print Density:</label>
            <select id="density">
                <option value="6">6 dpmm (152 dpi)</option>
                <option value="8" selected>8 dpmm (203 dpi)</option>
                <option value="12">12 dpmm (300 dpi)</option>
                <option value="24">24 dpmm (600 dpi)</option>
            </select>
        </div>
        <div style="display: flex; gap: 10px;">
            <div class="control-group" style="flex: 1;">
                <label for="width">Width (inches):</label>
                <input type="number" id="width" value="4">
            </div>
            <div class="control-group" style="flex: 1;">
                <label for="height">Height (inches):</label>
                <input type="number" id="height" value="6">
            </div>
        </div>
        <div class="control-group">
            <label for="zplCode">ZPL Code:</label>
            <textarea id="zplCode" rows="15">^XA
^FX Top section with logo, name and address.
^CF0,60
^FO50,50^GB100,100,100^FS
^FO75,75^FR^GB100,100,100^FS
^FO93,93^GB40,40,40^FS
^FO220,50^FDIntershipping, Inc.^FS
^CF0,30
^FO220,115^FD1000 Shipping Lane^FS
^FO220,155^FDShelbyville TN 38102^FS
^FO220,195^FDUnited States (USA)^FS
^FO50,250^GB700,3,3^FS

^FX Second section with recipient address and permit information.
^CFA,30
^FO50,300^FDJohn Doe^FS
^FO50,340^FD100 Main Street^FS
^FO50,380^FDSpringfield TN 39021^FS
^FO50,420^FDUnited States (USA)^FS
^CFA,15
^FO600,300^GB150,150,3^FS
^FO638,340^FDPermit^FS
^FO638,390^FD123456^FS
^FO50,500^GB700,3,3^FS

^FX Third section with barcode.
^BY5,2,270
^FO100,550^BC^FD12345678^FS

^FX Fourth section with carrier address and CA logo.
^FO50,900^GB700,3,3^FS
^CF0,40
^FO50,950^FDCtr. X34B-1^FS
^FO50,1000^FBREF1 F00B47^FS
^FO50,1050^FBREF2 BL4H8^FS
^CF0,190
^FO470,955^FDCA^FS
^FO450,950^GB250,150,3^FS
^XZ</textarea>
        </div>
        <div class="button-group">
            <button id="updateBtn">Redraw / Update Preview</button>
            <button id="printBtn">Print Label</button>
            <button id="findPrinterBtn" disabled>Find & Connect Printer</button>
        </div>
        
        <div id="previewContainer">
            <div id="loading" class="loading">กำลังโหลดรูปภาพตัวอย่าง...</div>
            <img id="labelImage" alt="ZPL Label Preview">
        </div>
    </div>

    <script>
        const densitySelect = document.getElementById('density');
        const widthInput = document.getElementById('width');
        const heightInput = document.getElementById('height');
        const zplTextArea = document.getElementById('zplCode');
        const updateBtn = document.getElementById('updateBtn');
        const printBtn = document.getElementById('printBtn');
        const findPrinterBtn = document.getElementById('findPrinterBtn');
        const labelImg = document.getElementById('labelImage');
        const loadingDiv = document.getElementById('loading');

        const ZPL_STORAGE_KEY = 'latestZplCode_wifi';

        // Load latest ZPL from localStorage
        function loadLatestZpl() {
            const savedZpl = localStorage.getItem(ZPL_STORAGE_KEY);
            if (savedZpl) {
                zplTextArea.value = savedZpl;
            }
        }

        // Save ZPL to localStorage
        function saveZpl() {
            localStorage.setItem(ZPL_STORAGE_KEY, zplTextArea.value);
        }

        async function updatePreview() {
            saveZpl(); // Save on every redraw
            const zpl = zplTextArea.value;
            const density = densitySelect.value;
            const width = widthInput.value;
            const height = heightInput.value;

            const url = `https://api.labelary.com/v1/printers/${density}dpmm/labels/${width}x${height}/0/`;

            loadingDiv.style.display = 'block';
            labelImg.style.display = 'none';

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Accept': 'image/png'
                    },
                    body: zpl
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const imageUrl = URL.createObjectURL(blob);
                    labelImg.src = imageUrl;
                    labelImg.style.display = 'inline-block';
                } else {
                    alert('Error generating preview: ' + response.statusText);
                }
            } catch (error) {
                alert('Fetch Error: ' + error.message);
            } finally {
                loadingDiv.style.display = 'none';
            }
        }

        function printLabel() {
            if (labelImg.src) {
                const printWindow = window.open('', '', 'height=600,width=800');
                printWindow.document.write('<html><head><title>Print Label</title></head><body><img src="' + labelImg.src + '" /></body></html>');
                printWindow.document.close();
                printWindow.focus();
                printWindow.print();
                printWindow.close();
            } else {
                alert('No label image to print. Please generate a preview first.');
            }
        }

        findPrinterBtn.addEventListener('click', () => {
            alert('This feature requires a client-side agent to be installed. This is not yet implemented.');
        });

        updateBtn.addEventListener('click', updatePreview);
        printBtn.addEventListener('click', printLabel);

        // Initial load
        window.onload = () => {
            loadLatestZpl();
            updatePreview();
        };
    </script>
</body>
</html>
