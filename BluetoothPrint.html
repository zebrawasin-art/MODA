<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Android Bluetooth ZPL Print</title>
<style>
body{font-family:Arial;padding:20px;background:#f5f5f5}
button{padding:12px 18px;margin:5px;font-size:16px}
textarea{width:100%;height:180px;margin-top:10px;font-family:monospace}
.status{margin-top:10px;font-weight:bold}
</style>
</head>
<body>
<h2>Bluetooth ZPL Printer</h2>
<button onclick="connectBLE()">Connect Printer</button>
<button onclick="printZPL()">Print</button>
<div class="status" id="status">Not connected</div>
<textarea id="zpl">^XA
^FO50,50^A0N,40,40^FDHELLO ZPL^FS
^XZ</textarea>
<script>
let device=null
let characteristic=null

const profiles=[
{service:'000018f0-0000-1000-8000-00805f9b34fb',char:'00002af1-0000-1000-8000-00805f9b34fb'},
{service:'38eb4a80-c570-11e3-9507-0002a5d5c51b',char:'be39ffa2-c570-11e3-9507-0002a5d5c51b'},
{service:'49535343-fe7d-4ae5-8fa9-9fafd205e455',char:'49535343-1e4d-4bd9-ba61-23c647249616'}
]

async function connectBLE(){
try{
if(!navigator.bluetooth){alert('Browser not support Bluetooth');return}

device=await navigator.bluetooth.requestDevice({acceptAllDevices:true,optionalServices:profiles.map(p=>p.service)})

document.getElementById('status').innerText='Connecting '+device.name

const server=await device.gatt.connect()

for(const p of profiles){
try{
const service=await server.getPrimaryService(p.service)
characteristic=await service.getCharacteristic(p.char)
break
}catch(e){}
}

if(!characteristic){
alert('Printer BLE service not found')
return
}

document.getElementById('status').innerText='Connected '+device.name
}catch(e){
alert(e.message)
}
}

async function printZPL(){
try{
if(!characteristic){alert('Not connected');return}

const zpl=document.getElementById('zpl').value
const encoder=new TextEncoder()
const data=encoder.encode(zpl)

let chunk=20
for(let i=0;i<data.length;i+=chunk){
let part=data.slice(i,i+chunk)
await characteristic.writeValue(part)
}

alert('Print success')
}catch(e){
alert('Print error '+e.message)
}
}
</script>
</body>
</html>
