<!DOCTYPE html>
<html lang="th">
<head>
	<title>MODA Bluetooth Print - Zebra ZPL</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
	<!-- อ้างอิงไฟล์ BrowserPrint จาก Local หรือ URL ที่ถูกต้อง -->
	<script type="text/javascript" src="https://cdn.jsdelivr.net/gh/viovendi/scandoo-dist@master/BrowserPrint-3.1.250.min.js"></script>
	<style>
		:root {
			--primary: #0066cc;
			--success: #28a745;
			--danger:  #dc3545;
			--warning: #e67e00;
			--secondary: #6c757d;
			--bg: #f0f2f5;
			--shadow: 0 4px 12px rgba(0,0,0,0.1);
		}
		* { margin:0; padding:0; box-sizing:border-box; }
		body {
			font-family: 'Segoe UI', Roboto, Arial, sans-serif;
			background: var(--bg); min-height:100vh; padding:10px; color:#333;
		}
		.container {
			background:#fff; border-radius:12px; box-shadow:var(--shadow);
			padding:20px; max-width:800px; margin:0 auto;
		}
		h1 { font-size:1.5rem; margin-bottom:15px; text-align:center; color:var(--primary); }
		.card { margin-bottom:15px; border:1px solid #ddd; border-radius:8px; padding:15px; }
		.card-title { font-weight:bold; margin-bottom:10px; font-size:0.9rem; text-transform:uppercase; color:var(--secondary); }
		
		.form-group { margin-bottom:10px; }
		label { display:block; font-size:0.85rem; margin-bottom:4px; font-weight:600; }
		input, textarea {
			width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; font-size:0.9rem;
			font-family: 'Courier New', monospace;
		}
		.btn-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
		button {
			flex:1; padding:12px; border:none; border-radius:6px; cursor:pointer;
			font-weight:bold; font-size:0.9rem; color:#fff; transition: opacity 0.2s;
			display: flex; align-items: center; justify-content: center; gap:8px;
		}
		button:active { opacity:0.7; }
		.btn-primary { background: var(--primary); }
		.btn-success { background: var(--success); }
		.btn-warning { background: var(--warning); }
		.btn-danger  { background: var(--danger); }
		
		#log {
			background:#222; color:#0f0; padding:10px; border-radius:6px;
			font-size:0.8rem; height:120px; overflow-y:auto; margin-top:10px;
			font-family: 'Consolas', monospace; white-space: pre-wrap;
		}
		.preview-box { text-align:center; margin-top:15px; }
		#labelPreview { max-width:100%; border:1px dashed #aaa; padding:5px; background:#fafafa; }
		.status-dot { height:10px; width:10px; border-radius:50%; display:inline-block; margin-right:5px; }
		.online { background: #28a745; box-shadow: 0 0 5px #28a745; }
		.offline { background: #dc3545; }
	</style>
</head>
<body>

<div class="container">
	<h1><i class="fas fa-print"></i> MODA Zebra Print</h1>

	<div class="card">
		<div class="card-title">การเชื่อมต่อเครื่องพิมพ์</div>
		<div class="form-group">
			<label>สถานะเครื่องพิมพ์: <span id="statusIcon" class="status-dot offline"></span> <span id="statusText">ยังไม่เชื่อมต่อ</span></label>
			<input type="text" id="txtPrinterName" placeholder="เลือกเครื่องพิมพ์..." readonly onclick="findPrinters()" />
		</div>
		<div class="btn-row">
			<button class="btn-primary" onclick="setupBrowserPrint()"><i class="fas fa-sync"></i> ตรวจสอบ Service</button>
			<button class="btn-warning" onclick="findPrinters()"><i class="fas fa-search"></i> ค้นหาเครื่องพิมพ์</button>
		</div>
	</div>

	<div class="card">
		<div class="card-title">ZPL Commands</div>
		<div class="form-group">
			<textarea id="txtZpl" rows="6">^XA
^FX MODA TEST LABEL
^CF0,60
^FO50,50^FDMODA ZPL^FS
^CF0,30
^FO50,130^FDTest Printing via BrowserPrint^FS
^FO50,180^FDDate: 10/03/2026^FS
^FO50,230^GB700,1,3^FS
^XZ</textarea>
		</div>
		<div class="btn-row">
			<button class="btn-success" id="btnPrint" onclick="printZpl()"><i class="fas fa-paper-plane"></i> สั่งพิมพ์ (Print)</button>
			<button class="btn-primary" onclick="updatePreview()"><i class="fas fa-eye"></i> ดูตัวอย่าง (Preview)</button>
		</div>
	</div>

	<div class="preview-box">
		<img id="labelPreview" src="https://api.labelary.com/v1/printers/8dpmm/labels/4x6/0/%5EXA%5EXZ" alt="Label Preview" />
		<div style="font-size:0.7rem; color:#888; margin-top:4px;">Powered by Labelary API</div>
	</div>

	<div id="log">รอรับคำสั่ง...</div>
</div>

<script type="text/javascript">
	let selectedDevice = null;
	let logEl = document.getElementById('log');

	function log(msg, type = 'info') {
		const now = new Date().toLocaleTimeString();
		const color = type === 'error' ? '#ff5555' : (type === 'success' ? '#55ff55' : '#00ff00');
		logEl.innerHTML += `<span style="color:${color}">[${now}] ${msg}</span>\n`;
		logEl.scrollTop = logEl.scrollHeight;
	}

	function setStatus(isOnline, text) {
		const dot = document.getElementById('statusIcon');
		const txt = document.getElementById('statusText');
		dot.className = isOnline ? 'status-dot online' : 'status-dot offline';
		txt.innerText = text || (isOnline ? 'พร้อมใช้งาน' : 'ยังไม่พร้อม');
	}

	/* ============================================================
	   BrowserPrint API Core
	   ============================================================ */

	// ตรวจสอบว่า Browser Print Service กำลังทำงานหรือไม่
	function setupBrowserPrint() {
		log('กำลังตรวจสอบ Browser Print Service...');
		
		// BrowserPrint.getDefaultDevice(type, success, error)
		BrowserPrint.getDefaultDevice("printer", function(device) {
			if (device != null) {
				selectedDevice = device;
				document.getElementById('txtPrinterName').value = device.name;
				setStatus(true, "เครื่องพิมพ์พื้นฐาน: " + device.name);
				log('พบเครื่องพิมพ์พื้นฐาน: ' + device.name, 'success');
			} else {
				log('ไม่พบเครื่องพิมพ์พื้นฐาน กรุณาค้นหาเครื่องพิมพ์', 'warning');
				setStatus(false, "ไม่พบเครื่องพิมพ์");
			}
		}, function(error) {
			log('ไม่สามารถติดต่อ Browser Print Service ได้ (เปิดหรือยัง?)', 'error');
			setStatus(false, "Service Offline");
		});
	}

	// ค้นหาเครื่องพิมพ์ทั้งหมดที่เชื่อมต่ออยู่
	function findPrinters() {
		log('กำลังค้นหาเครื่องพิมพ์...');
		
		BrowserPrint.getLocalDevices(function(devices) {
			const printers = devices.filter(d => d.deviceType === 'printer');
			if (printers.length > 0) {
				// ในที่นี้เลือกตัวแรก หรือให้ผู้ใช้เลือก (ตัวอย่างนี้เลือกตัวแรกอัตโนมัติ)
				selectedDevice = printers[0];
				document.getElementById('txtPrinterName').value = selectedDevice.name;
				setStatus(true, "พบเครื่องพิมพ์: " + selectedDevice.name);
				log(`พบเครื่องพิมพ์ทั้งหมด ${printers.length} เครื่อง`, 'success');
			} else {
				log('ไม่พบเครื่องพิมพ์ที่เชื่อมต่อผ่าน USB หรือ Network', 'warning');
			}
		}, function(error) {
			log('เกิดข้อผิดพลาดในการค้นหาเครื่องพิมพ์: ' + error, 'error');
		}, "printer");
	}

	// ฟังก์ชันส่ง ZPL ไปพิมพ์
	function printZpl() {
		if (!selectedDevice) {
			log('กรุณาเลือกเครื่องพิมพ์ก่อน', 'error');
			return;
		}

		const zpl = document.getElementById('txtZpl').value;
		log('กำลังส่งข้อมูลไปยัง ' + selectedDevice.name + '...');

		// device.send(data, success, error)
		selectedDevice.send(zpl, function(success) {
			log('ส่งข้อมูลการพิมพ์สำเร็จ!', 'success');
		}, function(error) {
			log('การพิมพ์ล้มเหลว: ' + error, 'error');
		});
	}

	/* ============================================================
	   Preview logic
	   ============================================================ */
	function updatePreview() {
		const zpl = document.getElementById('txtZpl').value;
		// ใช้ Labelary API ในการ Render ZPL เป็นรูปภาพ (สมมติ 4x6 นิ้ว)
		const url = `https://api.labelary.com/v1/printers/8dpmm/labels/4x6/0/${encodeURIComponent(zpl)}`;
		document.getElementById('labelPreview').src = url;
		log('อัปเดตตัวอย่างป้ายพิมพ์แล้ว');
	}

	window.onload = function() {
		log('เริ่มต้นโปรแกรม MODA Zebra Print');
		// ตั้งเวลาหน่วงเพื่อให้ BrowserPrint.js โหลดเสร็จก่อน
		setTimeout(setupBrowserPrint, 1000);
	};
</script>

</body>
</html>
